name: checkmate_flutter
description: Checkmate Flutter Web client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  http_parser: ^4.1.2
  intl: ^0.20.2
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  stomp_dart_client: 3.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
